var STAGE_IDS=FESTIVAL.stages.map(function(s){return s.id}),STAGE_CSS={},STAGE_SHORT={},STAGE_ORDER={};
FESTIVAL.stages.forEach(function(s){STAGE_CSS[s.id]=s.css;STAGE_SHORT[s.id]=s.short;STAGE_ORDER[s.id]=s.order});
var STORAGE_KEY=FESTIVAL.name.toLowerCase()+FESTIVAL.year+"_ratings";
var currentDay="Tous",activeStages=new Set(STAGE_IDS),searchQuery="",currentSort="scene";
document.getElementById("festTitle").textContent="\u26E7 "+FESTIVAL.name+" "+FESTIVAL.year+" \u26E7";
document.getElementById("festSubtitle").textContent="Mon programme & notes";
document.title=FESTIVAL.name+" "+FESTIVAL.year+" - Mon Programme";
function getRatings(){try{return JSON.parse(localStorage.getItem(STORAGE_KEY))||{}}catch(e){return{}}}
function saveRating(k,v){var r=getRatings();if(v===0)delete r[k];else r[k]=v;localStorage.setItem(STORAGE_KEY,JSON.stringify(r))}
function bandKey(b){return b.name+"|"+b.day}
function timeToMin(t){var p=t.split(":");var h=parseInt(p[0],10),m=parseInt(p[1],10);if(h<6)h+=24;return h*60+m}
function getNow(){var now=new Date(),h=now.getHours(),m=now.getMinutes();var nowMin=h*60+m;if(h<6)nowMin=(h+24)*60+m;var d=new Date(now);if(h<6)d.setDate(d.getDate()-1);var iso=d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");var day=null;for(var l in FESTIVAL.dates){if(FESTIVAL.dates[l]===iso){day=l;break}}return{day:day,min:nowMin}}
function isBandNowPlaying(b){var n=getNow();if(!n.day||b.day!==n.day)return false;return n.min>=timeToMin(b.start)&&n.min<timeToMin(b.end)}
function buildDayTabs(){var h='<button class="tab-btn '+("Tous"===currentDay?"active":"")+'" onclick="setDay(this)" data-day="Tous">Tous</button>';FESTIVAL.days.forEach(function(d){h+='<button class="tab-btn '+(d===currentDay?"active":"")+'" onclick="setDay(this)" data-day="'+d+'">'+d+"</button>"});h+='<button class="tab-btn '+("Notes"===currentDay?"active":"")+'" onclick="setDay(this)" data-day="Notes">\u2B50 Notes</button>';h+='<button class="tab-btn now-btn '+("Now"===currentDay?"active":"")+'" onclick="setDay(this)" data-day="Now"><span class="pulse"></span>EN LIVE</button>';document.getElementById("dayTabs").innerHTML=h}
function buildStageFilters(){document.getElementById("stageFilters").innerHTML=FESTIVAL.stages.map(function(s){return'<button class="filter-btn '+(activeStages.has(s.id)?"active":"")+'" onclick="toggleStage(this)" data-stage="'+s.id+'">'+s.short+"</button>"}).join("")}
function buildSortRow(){document.getElementById("sortRow").innerHTML='<button class="sort-btn '+(currentSort==="scene"?"active":"")+'" onclick="setSort(this)" data-sort="scene">Par scene</button><button class="sort-btn '+(currentSort==="heure"?"active":"")+'" onclick="setSort(this)" data-sort="heure">Par heure</button>'}
function setDay(el){currentDay=el.getAttribute("data-day");buildDayTabs();render()}
function toggleStage(el){var s=el.getAttribute("data-stage");if(activeStages.has(s))activeStages.delete(s);else activeStages.add(s);buildStageFilters();render()}
function setSort(el){currentSort=el.getAttribute("data-sort");buildSortRow();render()}
function getFiltered(){var ratings=getRatings();var list=BANDS.filter(function(b){if(currentDay==="Notes"){if(!ratings[bandKey(b)])return false}else if(currentDay==="Now"){if(!isBandNowPlaying(b))return false}else if(currentDay!=="Tous"&&b.day!==currentDay)return false;if(!activeStages.has(b.stage))return false;if(searchQuery&&!b.name.toLowerCase().includes(searchQuery))return false;return true});var dayIdx={};FESTIVAL.days.forEach(function(d,i){dayIdx[d]=i});if(currentSort==="heure"){list.sort(function(a,b){var da=dayIdx[a.day]||0,db=dayIdx[b.day]||0;if(da!==db)return da-db;var ta=timeToMin(a.start),tb=timeToMin(b.start);if(ta!==tb)return ta-tb;return(STAGE_ORDER[a.stage]||0)-(STAGE_ORDER[b.stage]||0)})}else{list.sort(function(a,b){var da=dayIdx[a.day]||0,db=dayIdx[b.day]||0;if(da!==db)return da-db;var sa=STAGE_ORDER[a.stage]||0,sb=STAGE_ORDER[b.stage]||0;if(sa!==sb)return sa-sb;return timeToMin(a.start)-timeToMin(b.start)})}return list}
function renderStars(key,rating){var html="",sk=key.replace(/'/g,"&apos;").replace(/"/g,"&quot;");for(var i=1;i<=5;i++){var hv=i-0.5,fv=i,fp=0;if(rating>=fv)fp=100;else if(rating>=hv)fp=50;html+='<div class="star-group"><div class="star-bg">\u2605</div><div class="star-fg" style="width:'+fp+'%"><span>\u2605</span></div><div class="star-click-left" onclick="rate(&quot;'+sk+"&quot;,"+hv+')"></div><div class="star-click-right" onclick="rate(&quot;'+sk+"&quot;,"+fv+')"></div></div>'}if(rating>0)html+='<span class="rating-display">'+rating+"/5</span>";return html}
function render(){var ratings=getRatings(),filtered=getFiltered(),grid=document.getElementById("grid");if(currentDay==="Now"&&filtered.length===0){grid.innerHTML='<div class="empty-state">Aucun concert en ce moment<br><small style="color:#555">'+FESTIVAL.name+" "+FESTIVAL.year+"</small></div>";updateStats(ratings);return}if(filtered.length===0){grid.innerHTML='<div class="empty-state">Aucun groupe trouv\u00E9</div>';updateStats(ratings);return}var lastDay="",lastTime="",pieces=[];filtered.forEach(function(b){var k=bandKey(b),r=ratings[k]||0,isNow=isBandNowPlaying(b);if((currentDay==="Tous"||currentDay==="Notes"||currentDay==="Now")&&b.day!==lastDay){lastDay=b.day;lastTime="";pieces.push('<div class="day-header">'+b.day+"</div>")}if(currentSort==="heure"&&b.start!==lastTime){lastTime=b.start;pieces.push('<div class="time-header">\uD83D\uDD50 '+b.start+"</div>")}var nowBadge=isNow?'<span class="now-badge">EN LIVE</span>':"";pieces.push('<div class="band-card'+(isNow?" now-playing":"")+'"><div class="band-info"><div class="band-name">'+b.name+nowBadge+'</div><div class="band-meta"><span class="stage-badge '+(STAGE_CSS[b.stage]||"")+'">'+(STAGE_SHORT[b.stage]||b.stage)+"</span><span>"+b.start+" - "+b.end+'</span></div></div><div class="stars">'+renderStars(k,r)+"</div></div>")});grid.innerHTML=pieces.join("");updateStats(ratings)}
function updateStats(ratings){var tot=Object.keys(ratings).length;var avg=tot?(Object.values(ratings).reduce(function(a,b){return a+b},0)/tot).toFixed(1):"-";var nowCount=BANDS.filter(isBandNowPlaying).length;var nowHtml=nowCount>0?' | <span style="color:var(--hf-green)"><strong>'+nowCount+"</strong> en live</span>":"";document.getElementById("statsBar").innerHTML="<span><strong>"+BANDS.length+"</strong> groupes</span><span><strong>"+tot+"</strong> not\u00E9s</span><span>Moy: <strong>"+avg+"</strong> \u2605</span>"+nowHtml}
function rate(key,val){var r=getRatings();if(r[key]===val)val=0;saveRating(key,val);render()}
function showSummary(){var ratings=getRatings();var rated=BANDS.filter(function(b){return ratings[bandKey(b)]}).sort(function(a,b){return ratings[bandKey(b)]-ratings[bandKey(a)]});var body=document.getElementById("modalBody");if(rated.length===0){body.innerHTML='<h2>Mon R\u00E9cap</h2><p style="color:#888">Aucun groupe not\u00E9.</p><button class="modal-close" onclick="closeModal()">Fermer</button>'}else{var items=rated.map(function(b){var r=ratings[bandKey(b)];var s="";for(var i=1;i<=5;i++){if(r>=i)s+="\u2605";else if(r>=i-0.5)s+="\u00BD";else s+="\u2606"}return'<div class="summary-item"><span>'+b.name+' <small style="color:#666">('+b.day+")</small></span><span class=\"summary-stars\">"+s+" "+r+"/5</span></div>"}).join("");var avg=(rated.reduce(function(a,b){return a+ratings[bandKey(b)]},0)/rated.length).toFixed(1);body.innerHTML='<h2>Mon R\u00E9cap</h2><p style="color:#888;margin-bottom:15px">'+rated.length+" groupes not\u00E9s \u2014 Moyenne: "+avg+" \u2605</p>"+items+'<button class="modal-close" onclick="closeModal()">Fermer</button>'}document.getElementById("modal").classList.add("show")}
function closeModal(){document.getElementById("modal").classList.remove("show")}
document.getElementById("modal").addEventListener("click",function(e){if(e.target.classList.contains("modal-overlay"))closeModal()});
function resetAll(){if(confirm("Supprimer toutes les notes ?")){localStorage.removeItem(STORAGE_KEY);render()}}
function showToast(msg,isErr){var ex=document.querySelector(".toast");if(ex)ex.remove();var t=document.createElement("div");t.className="toast"+(isErr?" error":"");t.textContent=msg;document.body.appendChild(t);setTimeout(function(){t.remove()},2500)}
function exportRatings(){var ratings=getRatings();if(Object.keys(ratings).length===0){showToast("Aucune note!",true);return}var data={app:FESTIVAL.name.toLowerCase(),year:FESTIVAL.year,version:3,exportDate:new Date().toISOString(),ratings:ratings};var blob=new Blob([JSON.stringify(data,null,2)],{type:"application/json"});var url=URL.createObjectURL(blob);var a=document.createElement("a");a.href=url;a.download=FESTIVAL.name.toLowerCase()+FESTIVAL.year+"_notes_"+new Date().toISOString().slice(0,10)+".json";document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);showToast(Object.keys(ratings).length+" notes export\u00E9es!")}
function importRatings(event){var file=event.target.files[0];if(!file)return;var reader=new FileReader();reader.onload=function(e){try{var data=JSON.parse(e.target.result);var ratings;if(data.ratings&&typeof data.ratings==="object")ratings=data.ratings;else if(typeof data==="object"&&!data.app)ratings=data;else throw new Error("x");var valid={},count=0;for(var key in ratings){if(ratings.hasOwnProperty(key)&&typeof ratings[key]==="number"&&ratings[key]>=0.5&&ratings[key]<=5){valid[key]=ratings[key];count++}}if(count===0){showToast("Aucune note valide.",true);return}var existing=getRatings();if(Object.keys(existing).length>0){if(confirm("Importer "+count+" notes.\nOK = Fusionner (garder meilleure)\nAnnuler = Remplacer")){for(var k in valid){if(valid.hasOwnProperty(k)&&(!existing[k]||valid[k]>existing[k]))existing[k]=valid[k]}localStorage.setItem(STORAGE_KEY,JSON.stringify(existing))}else{localStorage.setItem(STORAGE_KEY,JSON.stringify(valid))}}else{localStorage.setItem(STORAGE_KEY,JSON.stringify(valid))}render();showToast(count+" notes import\u00E9es!")}catch(err){showToast("Fichier invalide.",true);console.error(err)}};reader.readAsText(file);event.target.value=""}
document.getElementById("searchInput").addEventListener("input",function(e){searchQuery=e.target.value.toLowerCase().trim();render()});
