<style>
:root{--hf-black:#0a0a0a;--hf-dark:#1a1a1a;--hf-orange:#e85d26;--hf-gold:#d4a017;--hf-grey:#888;--hf-white:#eee;--hf-green:#27ae60}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--hf-black);color:var(--hf-white);font-family:'Oswald',sans-serif;min-height:100vh;overflow-x:hidden}
header{background:linear-gradient(180deg,#111,var(--hf-black));text-align:center;padding:25px 15px 10px;border-bottom:3px solid var(--hf-orange);position:sticky;top:0;z-index:100}
header h1{font-family:'Metal Mania',cursive;font-size:2.4rem;color:var(--hf-orange);text-transform:uppercase;letter-spacing:4px;text-shadow:0 0 20px rgba(232,93,38,.5)}
header .subtitle{font-size:.85rem;color:var(--hf-grey);letter-spacing:2px;margin-top:2px}
.controls{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;padding:10px 10px 6px;background:var(--hf-dark);border-bottom:1px solid #333;position:sticky;top:89px;z-index:99}
.tab-btn{background:#333;color:var(--hf-white);border:1px solid #444;padding:8px 14px;font-family:'Oswald',sans-serif;font-size:.85rem;font-weight:600;text-transform:uppercase;letter-spacing:1px;cursor:pointer;transition:all .2s;border-radius:3px}
.tab-btn:hover{background:#444}
.tab-btn.active{background:var(--hf-orange);color:#fff;border-color:var(--hf-orange)}
.tab-btn.now-btn.active{background:var(--hf-green);border-color:var(--hf-green)}
.tab-btn.now-btn .pulse{display:inline-block;width:8px;height:8px;background:#2ecc71;border-radius:50%;margin-right:5px;animation:pulse-anim 1.5s infinite}
@keyframes pulse-anim{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.7)}}
.filter-row{display:flex;flex-wrap:wrap;gap:5px;justify-content:center;padding:6px 10px 4px;background:var(--hf-dark);border-bottom:1px solid #333}
.sort-row{display:flex;flex-wrap:wrap;gap:5px;justify-content:center;padding:4px 10px 10px;background:var(--hf-dark);border-bottom:1px solid #333}
.filter-btn,.sort-btn{background:transparent;color:var(--hf-grey);border:1px solid #444;padding:5px 12px;font-family:'Oswald',sans-serif;font-size:.75rem;text-transform:uppercase;letter-spacing:1px;cursor:pointer;transition:all .2s;border-radius:2px}
.filter-btn:hover,.sort-btn:hover{color:var(--hf-white);border-color:#666}
.filter-btn.active{color:var(--hf-gold);border-color:var(--hf-gold)}
.sort-btn.active{color:var(--hf-green);border-color:var(--hf-green)}
.search-bar{padding:8px 15px;background:var(--hf-dark)}
.search-bar input{width:100%;padding:10px 15px;background:#2a2a2a;border:1px solid #444;color:var(--hf-white);font-family:'Oswald',sans-serif;font-size:1rem;border-radius:3px;outline:none}
.search-bar input:focus{border-color:var(--hf-orange)}
.search-bar input::placeholder{color:#666}
.stats-bar{display:flex;justify-content:center;gap:20px;padding:8px 10px;background:var(--hf-black);font-size:.8rem;color:var(--hf-grey);border-bottom:1px solid #222}
.stats-bar span strong{color:var(--hf-orange)}
#grid{display:grid;grid-template-columns:1fr;gap:0;padding:0;max-width:900px;margin:0 auto}
.day-header{padding:12px 15px 6px;background:#111;color:var(--hf-orange);font-weight:700;text-transform:uppercase;letter-spacing:2px;font-size:.85rem;border-bottom:1px solid #333}
.time-header{padding:8px 15px;background:#181818;color:var(--hf-green);font-weight:600;letter-spacing:1px;font-size:.8rem;border-bottom:1px solid #2a2a2a;border-left:3px solid var(--hf-green)}
.band-card{display:flex;align-items:center;gap:12px;padding:12px 15px;background:var(--hf-dark);border-bottom:1px solid #2a2a2a;transition:background .15s}
.band-card:hover{background:#252525}
.band-card.now-playing{background:#1a2e1a;border-left:3px solid var(--hf-green)}
.band-card.now-playing .band-name{color:var(--hf-green)}
.now-badge{display:inline-block;background:var(--hf-green);color:#fff;padding:1px 6px;border-radius:2px;font-size:.6rem;font-weight:700;animation:pulse-anim 1.5s infinite;margin-left:6px;vertical-align:middle}
.band-info{flex:1;min-width:0}
.band-name{font-size:1.05rem;font-weight:700;text-transform:uppercase;letter-spacing:.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:pointer}
.band-name:hover{color:var(--hf-orange)}
.band-meta{font-size:.75rem;color:var(--hf-grey);margin-top:2px;display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.stage-badge{display:inline-block;padding:1px 7px;border-radius:2px;font-size:.65rem;font-weight:600;color:#fff}
.stage-ms1{background:#c0392b}.stage-ms2{background:#2980b9}.stage-warzone{background:#27ae60}
.stage-valley{background:#8e44ad}.stage-temple{background:#555}.stage-altar{background:#d35400}
.stars{display:flex;gap:0;flex-shrink:0;align-items:center}
.star-group{position:relative;width:28px;height:28px;cursor:pointer;-webkit-tap-highlight-color:transparent;user-select:none;font-size:1.3rem;line-height:28px}
.star-group .star-bg{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:#444;pointer-events:none;z-index:1}
.star-group .star-fg{position:absolute;top:0;left:0;height:100%;width:0%;overflow:hidden;pointer-events:none;z-index:2}
.star-group .star-fg span{display:block;width:28px;text-align:center;color:var(--hf-gold);text-shadow:0 0 8px rgba(212,160,23,.4)}
.star-group .star-click-left,.star-group .star-click-right{position:absolute;top:0;height:100%;z-index:3}
.star-group .star-click-left{left:0;width:50%}
.star-group .star-click-right{right:0;width:50%}
.star-group:hover{transform:scale(1.15)}

.empty-state{text-align:center;padding:60px 20px;color:#555;font-size:1.1rem}
.export-bar{text-align:center;padding:20px;background:var(--hf-dark);border-top:1px solid #333;margin-top:20px}
.export-btn{background:var(--hf-orange);color:#fff;border:none;padding:12px 30px;font-family:'Oswald',sans-serif;font-size:1rem;font-weight:600;text-transform:uppercase;letter-spacing:2px;cursor:pointer;border-radius:3px;margin:5px;transition:all .2s}
.export-btn:hover{background:#d14d1a;transform:translateY(-1px)}
.export-btn.secondary{background:#444}
.export-btn.secondary:hover{background:#555}
.io-bar{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;padding:15px 20px;background:#111;border-top:1px solid #333}
.io-btn{background:#2a6b3a;color:#fff;border:none;padding:10px 20px;font-family:'Oswald',sans-serif;font-size:.85rem;font-weight:600;text-transform:uppercase;letter-spacing:1px;cursor:pointer;border-radius:3px;transition:all .2s}
.io-btn:hover{background:#35854a;transform:translateY(-1px)}
.io-btn.import-btn{background:#2980b9}
.io-btn.import-btn:hover{background:#3498db}
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#27ae60;color:#fff;padding:12px 24px;border-radius:6px;font-family:'Oswald',sans-serif;font-size:.9rem;font-weight:600;z-index:400;box-shadow:0 4px 15px rgba(0,0,0,.4);animation:toastIn .3s ease,toastOut .3s ease 2.2s forwards;max-width:90vw;text-align:center}
.toast.error{background:#c0392b}
@keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(20px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
@keyframes toastOut{from{opacity:1}to{opacity:0}}
#scrollTop{position:fixed;bottom:20px;right:20px;width:44px;height:44px;background:var(--hf-orange);color:#fff;border:none;border-radius:50%;font-size:1.3rem;cursor:pointer;display:none;z-index:200;box-shadow:0 2px 10px rgba(0,0,0,.5)}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:300;justify-content:center;align-items:center;padding:20px}
.modal-overlay.show{display:flex}
.modal-content{background:var(--hf-dark);border:1px solid #444;border-radius:6px;padding:30px;max-width:500px;width:100%;max-height:80vh;overflow-y:auto;text-align:center}

.band-modal-title .band-modal-meta{font-size:.75rem;color:var(--hf-grey);display:flex;gap:8px;flex-wrap:wrap}
.band-modal-body{padding:16px 20px}

.btn-spotify{background:#1DB954;color:#fff}
.btn-youtube{background:#FF0000;color:#fff}
.btn-wiki{background:#2a2a2a;color:var(--hf-white);border:1px solid #555}
.btn-mb{background:#ba478f;color:#fff}

@media(min-width:600px){header h1{font-size:3rem}.band-card{padding:14px 20px}.star-group{width:32px;height:32px;font-size:1.4rem;line-height:32px}.star-group .star-fg span{width:32px}}

</head>

var STAGE_IDS=FESTIVAL.stages.map(function(s){return s.id});
var STAGE_CSS={},STAGE_SHORT={},STAGE_ORDER={};
FESTIVAL.stages.forEach(function(s){STAGE_CSS[s.id]=s.css;STAGE_SHORT[s.id]=s.short;STAGE_ORDER[s.id]=s.order});
var STORAGE_KEY=FESTIVAL.name.toLowerCase()+FESTIVAL.year+'_ratings';
var currentDay='Tous',activeStages=new Set(STAGE_IDS),searchQuery='',currentSort='scene';
document.getElementById('festTitle').textContent='⛧ '+FESTIVAL.name+' '+FESTIVAL.year+' ⛧';
document.getElementById('festSubtitle').textContent='Mon programme & notes';
document.title=FESTIVAL.name+' '+FESTIVAL.year+' - Mon Programme';
function getRatings(){try{return JSON.parse(localStorage.getItem(STORAGE_KEY))||{}}catch(e){return{}}}
function saveRating(k,v){var r=getRatings();if(v===0)delete r[k];else r[k]=v;localStorage.setItem(STORAGE_KEY,JSON.stringify(r))}
function bandKey(b){return b.name+'|'+b.day}
function timeToMin(t){var p=t.split(':');var h=parseInt(p[0],10),m=parseInt(p[1],10);if(h<6)h+=24;return h*60+m}
function getNow(){var now=new Date(),h=now.getHours(),m=now.getMinutes();var nowMin=h*60+m;if(h<6)nowMin=(h+24)*60+m;var d=new Date(now);if(h<6)d.setDate(d.getDate()-1);var iso=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');var day=null;for(var l in FESTIVAL.dates){if(FESTIVAL.dates[l]===iso){day=l;break}}return{day:day,min:nowMin}}
function isBandNowPlaying(b){var n=getNow();if(!n.day||b.day!==n.day)return false;return n.min>=timeToMin(b.start)&&n.min<timeToMin(b.end)}
function buildDayTabs(){var h='<button class="tab-btn '+('Tous'===currentDay?'active':'')+' " onclick="setDay(this)" data-day="Tous">Tous</button>';FESTIVAL.days.forEach(function(d){h+='<button class="tab-btn '+(d===currentDay?'active':'')+' " onclick="setDay(this)" data-day="'+d+'">'+d+'</button>'});h+='<button class="tab-btn '+('Notes'===currentDay?'active':'')+' " onclick="setDay(this)" data-day="Notes">⭐ Notes</button>';h+='<button class="tab-btn now-btn '+('Now'===currentDay?'active':'')+' " onclick="setDay(this)" data-day="Now"><span class="pulse"></span>EN LIVE</button>';document.getElementById('dayTabs').innerHTML=h}
function buildStageFilters(){document.getElementById('stageFilters').innerHTML=FESTIVAL.stages.map(function(s){return'<button class="filter-btn '+(activeStages.has(s.id)?'active':'')+' " onclick="toggleStage(this)" data-stage="'+s.id+'">'+s.short+'</button>'}).join('')}
function buildSortRow(){document.getElementById('sortRow').innerHTML='<button class="sort-btn '+(currentSort==='scene'?'active':'')+' " onclick="setSort(this)" data-sort="scene">Par scène</button>'+'<button class="sort-btn '+(currentSort==='heure'?'active':'')+' " onclick="setSort(this)" data-sort="heure">Par heure</button>'}
function setDay(el){currentDay=el.getAttribute('data-day');buildDayTabs();render()}
function toggleStage(el){var s=el.getAttribute('data-stage');if(activeStages.has(s))activeStages.delete(s);else activeStages.add(s);buildStageFilters();render()}
function setSort(el){currentSort=el.getAttribute('data-sort');buildSortRow();render()}
function getFiltered(){var ratings=getRatings();var list=BANDS.filter(function(b){if(currentDay==='Notes'){if(!ratings[bandKey(b)])return false}else if(currentDay==='Now'){if(!isBandNowPlaying(b))return false}else if(currentDay!=='Tous'&&b.day!==currentDay)return false;if(!activeStages.has(b.stage))return false;if(searchQuery&&!b.name.toLowerCase().includes(searchQuery))return false;return true});var dayIdx={};FESTIVAL.days.forEach(function(d,i){dayIdx[d]=i});if(currentSort==='heure'){list.sort(function(a,b){var da=dayIdx[a.day]||0,db=dayIdx[b.day]||0;if(da!==db)return da-db;var ta=timeToMin(a.start),tb=timeToMin(b.start);if(ta!==tb)return ta-tb;return(STAGE_ORDER[a.stage]||0)-(STAGE_ORDER[b.stage]||0)})}else{list.sort(function(a,b){var da=dayIdx[a.day]||0,db=dayIdx[b.day]||0;if(da!==db)return da-db;var sa=STAGE_ORDER[a.stage]||0,sb=STAGE_ORDER[b.stage]||0;if(sa!==sb)return sa-sb;return timeToMin(a.start)-timeToMin(b.start)})}return list}
function renderStars(key,rating){var html='',sk=key.replace(/'/g,'&apos;').replace(/"/g,'&quot;');for(var i=1;i<=5;i++){var hv=i-0.5,fv=i,fp=0;if(rating>=fv)fp=100;else if(rating>=hv)fp=50;html+='<div class="star-group"><div class="star-bg">★</div><div class="star-fg" style="width:'+fp+'%"><span>★</span></div><div class="star-click-left" onclick="rate(\x27'+sk+'\x27,'+hv+');event.stopPropagation()"></div><div class="star-click-right" onclick="rate(\x27'+sk+'\x27,'+fv+');event.stopPropagation()"></div></div>'}if(rating>0)html+='<span class="rating-display">'+rating+'/5</span>';return html}
function esc(s){return s.replace(/\\/g,'\\\\').replace(/'/g,"\\' ")}
function mobSelect(key,rating){var sk=key.replace(/'/g,'&apos;').replace(/"/g,'&quot;');var sv=Math.round(rating);var s='<div class="mob-sel"><select onchange="rateMob(&apos;'+sk+'&apos;,+this.value)">';s+='<option value="0"'+(sv===0?' selected':'')+'>\u2014 note ?</option>';s+='<option value="1"'+(sv===1?' selected':'')+'>★ 1/5</option>';s+='<option value="2"'+(sv===2?' selected':'')+'>★★ 2/5</option>';s+='<option value="3"'+(sv===3?' selected':'')+'>★★★ 3/5</option>';s+='<option value="4"'+(sv===4?' selected':'')+'>★★★★ 4/5</option>';s+='<option value="5"'+(sv===5?' selected':'')+'>★★★★★ 5/5</option>';s+='</select></div>';return s}function rateMob(key,val){val=+val;if(val===0){var r=getRatings();delete r[key];localStorage.setItem(STORAGE_KEY,JSON.stringify(r));render();return}saveRating(key,val);render()}function render(){var ratings=getRatings(),filtered=getFiltered(),grid=document.getElementById('grid');if(currentDay==='Now'&&filtered.length===0){grid.innerHTML='<div class="empty-state">Aucun concert en ce moment<br><small style="color:#555">'+FESTIVAL.name+' '+FESTIVAL.year+'</small></div>';updateStats(ratings);return}if(filtered.length===0){grid.innerHTML='<div class="empty-state">Aucun groupe trouvé</div>';updateStats(ratings);return}var lastDay='',lastTime='',pieces=[];filtered.forEach(function(b){var k=bandKey(b),r=ratings[k]||0,isNow=isBandNowPlaying(b);if((currentDay==='Tous'||currentDay==='Notes'||currentDay==='Now')&&b.day!==lastDay){lastDay=b.day;lastTime='';pieces.push('<div class="day-header">'+b.day+'</div>')}if(currentSort==='heure'&&b.start!==lastTime){lastTime=b.start;pieces.push('<div class="time-header">&#128336; '+b.start+'</div>')}var nowBadge=isNow?'<span class="now-badge">EN LIVE</span>':'';var sn=esc(b.name),sd=esc(b.day),ss=esc(b.stage);pieces.push('<div class="band-card'+(isNow?' now-playing':'')+'"><div class="band-info"><div class="band-name" onclick="openBandModal(\x27'+sn+'\x27,\x27'+sd+'\x27,\x27'+ss+'\x27,\x27'+b.start+'\x27,\x27'+b.end+'\x27)">'+b.name+nowBadge+'</div><div class="band-meta"><span class="stage-badge '+(STAGE_CSS[b.stage]||'')+'">'+( STAGE_SHORT[b.stage]||b.stage)+'</span><span>'+b.start+' - '+b.end+'</span></div></div><div class="stars">'+renderStars(k,r)+'</div>'+mobSelect(k,r)+'</div>')});grid.innerHTML=pieces.join('');updateStats(ratings)}
function updateStats(ratings){var tot=Object.keys(ratings).length;var avg=tot?(Object.values(ratings).reduce(function(a,b){return a+b},0)/tot).toFixed(1):'-';var nowCount=BANDS.filter(isBandNowPlaying).length;var nowHtml=nowCount>0?' | <span style="color:var(--hf-green)"><strong>'+nowCount+'</strong> en live</span>':'';document.getElementById('statsBar').innerHTML='<span><strong>'+BANDS.length+'</strong> groupes</span><span><strong>'+tot+'</strong> notés</span><span>Moy: <strong>'+avg+'</strong> ★</span>'+nowHtml}
function rate(key,val){var r=getRatings();if(r[key]===val)val=0;saveRating(key,val);render()}
function showSummary(){var ratings=getRatings();var rated=BANDS.filter(function(b){return ratings[bandKey(b)]}).sort(function(a,b){return ratings[bandKey(b)]-ratings[bandKey(a)]});var body=document.getElementById('modalBody');if(rated.length===0){body.innerHTML='<h2>Mon Récap</h2><p style="color:#888">Aucun groupe noté.</p><button class="modal-close" onclick="closeModal()">Fermer</button>'}else{var items=rated.map(function(b){var r=ratings[bandKey(b)];var s='';for(var i=1;i<=5;i++){if(r>=i)s+='★';else if(r>=i-0.5)s+='½';else s+='☆'}return'<div class="summary-item"><span>'+b.name+' <small style="color:#666">('+b.day+')</small></span><span class="summary-stars">'+s+' '+r+'/5</span></div>'}).join('');var avg=(rated.reduce(function(a,b){return a+ratings[bandKey(b)]},0)/rated.length).toFixed(1);body.innerHTML='<h2>Mon Récap</h2><p style="color:#888;margin-bottom:15px">'+rated.length+' groupes notés — Moyenne: '+avg+' ★</p>'+items+'<button class="modal-close" onclick="closeModal()">Fermer</button>'}document.getElementById('modal').classList.add('show')}
function closeModal(){document.getElementById('modal').classList.remove('show')}
document.getElementById('modal').addEventListener('click',function(e){if(e.target===document.getElementById('modal'))closeModal()});
function resetAll(){if(confirm('Supprimer toutes les notes ?')){localStorage.removeItem(STORAGE_KEY);render()}}
function showToast(msg,isErr){var ex=document.querySelector('.toast');if(ex)ex.remove();var t=document.createElement('div');t.className='toast'+(isErr?' error':'');t.textContent=msg;document.body.appendChild(t);setTimeout(function(){t.remove()},2500)}
function exportRatings(){var ratings=getRatings();if(Object.keys(ratings).length===0){showToast('Aucune note!',true);return}var data={app:FESTIVAL.name.toLowerCase(),year:FESTIVAL.year,version:3,exportDate:new Date().toISOString(),ratings:ratings};var blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});var url=URL.createObjectURL(blob);var a=document.createElement('a');a.href=url;a.download=FESTIVAL.name.toLowerCase()+FESTIVAL.year+'_notes_'+new Date().toISOString().slice(0,10)+'.json';document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);showToast(Object.keys(ratings).length+' notes exportées!')}
function importRatings(event){var file=event.target.files[0];if(!file)return;var reader=new FileReader();reader.onload=function(e){try{var data=JSON.parse(e.target.result);var ratings;if(data.ratings&&typeof data.ratings==='object')ratings=data.ratings;else if(typeof data==='object'&&!data.app)ratings=data;else throw new Error('x');var valid={},count=0;for(var key in ratings){if(ratings.hasOwnProperty(key)&&typeof ratings[key]==='number'&&ratings[key]>=0.5&&ratings[key]<=5){valid[key]=ratings[key];count++}}if(count===0){showToast('Aucune note valide.',true);return}var existing=getRatings();if(Object.keys(existing).length>0){if(confirm('Importer '+count+' notes.\nOK = Fusionner\nAnnuler = Remplacer')){for(var k in valid){if(valid.hasOwnProperty(k)&&(!existing[k]||valid[k]>existing[k]))existing[k]=valid[k]}localStorage.setItem(STORAGE_KEY,JSON.stringify(existing))}else{localStorage.setItem(STORAGE_KEY,JSON.stringify(valid))}}else{localStorage.setItem(STORAGE_KEY,JSON.stringify(valid))}render();showToast(count+' notes importées!')}catch(err){showToast('Fichier invalide.',true);console.error(err)}};reader.readAsText(file);event.target.value=''}
function openBandModal(name,day,stage,start,end){var modal=document.getElementById('bandModal');var body=document.getElementById('bandModalBody');var stCss=STAGE_CSS[stage]||'',stShort=STAGE_SHORT[stage]||stage;body.innerHTML='<div class="band-modal-header"><div class="band-modal-title"><h2>'+name+'</h2><div class="band-modal-meta"><span class="stage-badge '+stCss+'">'+stShort+'</span><span>'+day+' &bull; '+start+' - '+end+'</span></div></div><button class="band-modal-close-btn" onclick="closeBandModal()">&#x2715;</button></div><div class="band-modal-body"><p class="bio loading" id="bandBio">Chargement des infos...</p><div class="band-modal-tags" id="bandTags"></div><div class="band-modal-links" id="bandLinks"></div></div>';modal.classList.add('show');document.body.style.overflow='hidden';fetchBandInfo(name)}
function closeBandModal(){document.getElementById('bandModal').classList.remove('show');document.body.style.overflow=''}
document.getElementById('bandModal').addEventListener('click',function(e){if(e.target===document.getElementById('bandModal'))closeBandModal()});
function fetchBandInfo(name){var enc=encodeURIComponent(name);var url='https://musicbrainz.org/ws/2/artist?query=artist:'+enc+'&limit=1&fmt=json';fetch(url,{headers:{'User-Agent':'HellfestApp/1.0 (festival-app)'}}).then(function(r){return r.json()}).then(function(data){var artist=data.artists&&data.artists[0];if(!artist){document.getElementById('bandBio').textContent='Aucune information disponible.';renderBandLinks(name,null);return}var tags=(artist.tags||[]).slice(0,8);var tagsEl=document.getElementById('bandTags');if(tags.length){tagsEl.innerHTML=tags.map(function(t){return'<span class="band-modal-tag">'+t.name+'</span>'}).join('')}var bio='';if(artist.disambiguation)bio+='<em>'+artist.disambiguation+'</em><br>';if(artist['begin-area'])bio+='Origine : '+artist['begin-area'].name+'<br>';if(artist['life-span']){var ls=artist['life-span'];if(ls.begin)bio+='Actif depuis : '+ls.begin.slice(0,4);if(ls.end)bio+=' &ndash; '+ls.end.slice(0,4);if(bio)bio+='<br>'}if(!bio)bio='Cliquez les liens ci-dessous pour en savoir plus.';document.getElementById('bandBio').innerHTML=bio;document.getElementById('bandBio').classList.remove('loading');renderBandLinks(name,artist.id)}).catch(function(){document.getElementById('bandBio').textContent='Impossible de charger les infos (hors-ligne ?)';renderBandLinks(name,null)})}
function renderBandLinks(name,mbid){var enc=encodeURIComponent(name);var linksEl=document.getElementById('bandLinks');var links=[{label:'Tidal',cls:'btn-tidal',appUrl:'tidal://search?q='+enc,webUrl:'https://tidal.com/search?q='+enc,useApp:true},{label:'Spotify',cls:'btn-spotify',appUrl:'spotify:search:'+enc,webUrl:'https://open.spotify.com/search/'+enc,useApp:true},{label:'YouTube',cls:'btn-youtube',href:'https://www.youtube.com/results?search_query='+enc+'+metal'},{label:'Wikipedia',cls:'btn-wiki',href:'https://fr.wikipedia.org/wiki/Special:Search?search='+enc}];if(mbid)links.push({label:'MusicBrainz',cls:'btn-mb',href:'https://musicbrainz.org/artist/'+mbid});linksEl.innerHTML=links.map(function(l){if(l.useApp){return'<a class="band-link-btn '+l.cls+'" href="#" onclick="handleAppLink(event,\x27'+l.appUrl+'\x27,\x27'+l.webUrl+'\x27)">'+l.label+'</a>'}return'<a class="band-link-btn '+l.cls+'" href="'+l.href+'" target="_blank" rel="noopener">'+l.label+'</a>'}).join('')}
function handleAppLink(event,appUrl,webUrl){event.preventDefault();var iframe=document.createElement('iframe');iframe.style.display='none';iframe.src=appUrl;document.body.appendChild(iframe);setTimeout(function(){try{document.body.removeChild(iframe)}catch(e){}window.open(webUrl,'_blank')},1500)}
document.getElementById('searchInput').addEventListener('input',function(e){searchQuery=e.target.value.toLowerCase().trim();render()});
window.addEventListener('scroll',function(){document.getElementById('scrollTop').style.display=window.scrollY>400?'block':'none'});
setInterval(function(){if(currentDay==='Now')render()},30000);
buildDayTabs();buildStageFilters();buildSortRow();render();
</script>
</body>
